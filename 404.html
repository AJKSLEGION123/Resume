<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Pavel Tyo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#08080d;color:#eaeaf0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.c{max-width:420px}
h1{font-size:clamp(64px,15vw,120px);font-weight:900;letter-spacing:-4px;background:linear-gradient(135deg,#6366f1,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
p{color:#9090a8;font-size:16px;margin:12px 0 28px;line-height:1.6}
a{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:12px;font-size:15px;font-weight:500;text-decoration:none;background:#6366f1;color:#fff;transition:background .25s,transform .25s}
a:hover{background:#818cf8;transform:translateY(-2px)}
@media(prefers-color-scheme:light){body{background:#f7f7fb;color:#111118}p{color:#555570}a{background:#4f46e5}a:hover{background:#6366f1}}
</style>
</head>
<body>
<div class="c">
<h1>404</h1>
<p>Страница не найдена. Возможно, она была перемещена или удалена.</p>
<a href="/">← На главную</a>
</div>
</body>
</html>
